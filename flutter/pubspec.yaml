name: mont
description: "Workout and run tracker"
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  http: ^1.2.2
  window_manager: ^0.5.1
  intl: ^0.20.2
  path: any
  path_provider: ^2.1.3
  shared_preferences: ^2.5.3
  web: ^0.5.1
  package_info_plus: ^8.0.0
  cupertino_icons: ^1.0.8
  fl_chart: ^1.1.1
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  file_picker: ^8.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: "assets/icon.png"
  image_path: "assets/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png
